###################################################
# This Compose file provides the development environment for the todo app.
#
# Secrets are loaded from a local .env file (see .env.example). Do not commit
# .env. The proxy mounts the Docker socket read-only.
###################################################

x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  ###################################################
  # Service: proxy
  ###################################################
  proxy:
    <<: *hardening
    image: traefik:v3.6
    command: --providers.docker
    ports:
      - 80:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend

  ###################################################
  # Service: backend
  ###################################################
  backend:
    <<: *hardening
    build:
      context: ./
      target: backend-dev
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    depends_on:
      mysql:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/src
          action: sync
          target: /usr/local/app/src
        - path: ./backend/package.json
          action: rebuild
    labels:
      traefik.http.routers.backend.rule: Host(`localhost`) && PathPrefix(`/api`)
      traefik.http.services.backend.loadbalancer.server.port: 3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - frontend
      - backend

  ###################################################
  # Service: client
  ###################################################
  client:
    <<: *hardening
    build:
      context: ./
      target: client-dev
    develop:
      watch:
        - path: ./client/src
          action: sync
          target: /usr/local/app/src
        - path: ./client/package.json
          action: rebuild
    labels:
      traefik.http.routers.client.rule: Host(`localhost`)
      traefik.http.services.client.loadbalancer.server.port: 5173
    networks:
      - frontend

  ###################################################
  # Service: mysql
  #
  # Isolated on the `backend` network — not reachable from the proxy or host.
  ###################################################
  mysql:
    <<: *hardening
    image: mysql:9.3
    volumes:
      - todo-mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  ###################################################
  # Service: phpmyadmin
  ###################################################
  phpmyadmin:
    <<: *hardening
    image: phpmyadmin
    env_file:
      - .env
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    labels:
      traefik.http.routers.phpmyadmin.rule: Host(`db.localhost`)
      traefik.http.services.phpmyadmin.loadbalancer.server.port: 80
    networks:
      - frontend
      - backend

volumes:
  todo-mysql-data:

networks:
  frontend:
  backend:
    internal: true
